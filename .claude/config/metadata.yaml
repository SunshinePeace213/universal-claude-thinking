# Registry Configuration
registry:
  version: "1.0.1"
  maxModules: 50
  tokenBudget: 5000
  cacheEnabled: true
  cacheTTL: 3600  # 1 hour in seconds
  validationRequired: true
  quarantineEnabled: true
  quarantineMaxRetries: 3