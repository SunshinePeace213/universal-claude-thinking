edge_cases:
  - request: ""
    expected_category: "simple"
    min_confidence: 0.8
    notes: "Empty request should fallback to simple"
  - request: "   "
    expected_category: "simple"
    min_confidence: 0.8
    notes: "Whitespace-only request should fallback to simple"
  - request: "!!!"
    expected_category: "simple"
    min_confidence: 0.8
    notes: "Non-alphabetic request should fallback to simple"
  - request: "hello"
    expected_category: "simple"
    min_confidence: 0.8
    notes: "Ambiguous single word should fallback to simple"

